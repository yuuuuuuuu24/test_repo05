name: Manual platform smoke tests

on:
  workflow_dispatch:
    inputs:
      force_fresh_download:
        description: "Skip shared model artifact; each job downloads its own model via setup.sh"
        required: false
        default: false
        type: boolean
      enable_linux_cuda:
        description: "Run optional self-hosted Linux CUDA job"
        required: false
        default: false
        type: boolean
      enable_windows_cuda:
        description: "Run optional self-hosted Windows CUDA job"
        required: false
        default: false
        type: boolean
      enable_linux_amd:
        description: "Run optional self-hosted Linux AMD/ROCm job"
        required: false
        default: false
        type: boolean
      enable_windows_amd:
        description: "Run optional self-hosted Windows AMD/HIP job"
        required: false
        default: false
        type: boolean
      enable_linux_vulkan:
        description: "Run optional self-hosted Linux Vulkan job"
        required: false
        default: false
        type: boolean
      enable_windows_vulkan:
        description: "Run optional self-hosted Windows Vulkan job"
        required: false
        default: false
        type: boolean
  pull_request:
    types: [labeled]

permissions:
  contents: read

env:
  BONSAI_MODEL: "1.7B"

jobs:
  download-model:
    name: Download models (Bonsai Q1_0 + Ternary-Bonsai Q2_0)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'smoke-test')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install huggingface-hub
      - name: Cache models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models
          key: models-all-${{ env.BONSAI_MODEL }}-${{ hashFiles('scripts/download_models.sh') }}
      - name: Download models (both families)
        if: steps.cache-models.outputs.cache-hit != 'true'
        env:
          BONSAI_FAMILY: all
        run: ./scripts/download_models.sh
      - name: Upload models
        uses: actions/upload-artifact@v4
        with:
          name: all-models
          path: models
          retention-days: 1
          compression-level: 0

  # ──────────────────────────────────────────
  # Always-on hosted runners
  # ──────────────────────────────────────────

  linux-x86-cpu:
    name: Linux x86 CPU (hosted)
    needs: [download-model]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download models
        if: ${{ !inputs.force_fresh_download }}
        uses: actions/download-artifact@v4
        with:
          name: all-models
          path: models
      - name: Log runner hardware
        run: |
          echo "Runner: $RUNNER_OS/$RUNNER_ARCH"
          uname -a || true
          lscpu || true
          nvidia-smi || true
          rocminfo || true
          vulkaninfo --summary || true
      - name: Cache binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-${{ runner.arch }}-bonsai-bin-v2-${{ hashFiles('scripts/download_binaries.sh', 'setup.sh') }}
      - name: Setup
        env:
          BONSAI_FAMILY: all
        run: ./setup.sh
      - name: llama-cli smoke test (Bonsai Q1_0)
        run: './scripts/run_llama.sh -c 256 -st -n 50 -p "The meaning of life is"'
      - name: llama-cli smoke test (Ternary-Bonsai Q2_0)
        env:
          BONSAI_FAMILY: ternary
        run: './scripts/run_llama.sh -c 256 -st -n 50 -p "The meaning of life is"'

  windows-x86-cpu:
    name: Windows x86 CPU (hosted)
    needs: [download-model]
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download models
        if: ${{ !inputs.force_fresh_download }}
        uses: actions/download-artifact@v4
        with:
          name: all-models
          path: models
      - name: Log runner hardware
        shell: pwsh
        run: |
          Write-Host "Runner: $env:RUNNER_OS/$env:RUNNER_ARCH"
          Get-CimInstance Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors | Format-Table -AutoSize
          Get-CimInstance Win32_VideoController | Select-Object Name, AdapterRAM, DriverVersion | Format-Table -AutoSize
          if (Get-Command nvidia-smi -ErrorAction SilentlyContinue) { nvidia-smi }
      - name: Cache binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-${{ runner.arch }}-bonsai-bin-v2-${{ hashFiles('scripts/download_binaries.sh', 'setup.sh', 'setup.ps1') }}
      - name: Setup
        env:
          BONSAI_FAMILY: all
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\setup.ps1
      - name: llama-cli smoke test (Bonsai Q1_0)
        shell: pwsh
        run: .\scripts\run_llama.ps1 -c 256 -st -n 50 -p "The meaning of life is"
      - name: llama-cli smoke test (Ternary-Bonsai Q2_0)
        shell: pwsh
        env:
          BONSAI_FAMILY: ternary
        run: .\scripts\run_llama.ps1 -c 256 -st -n 50 -p "The meaning of life is"

  macos-metal:
    name: macOS Metal + MLX (hosted)
    needs: [download-model]
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Download models
        if: ${{ !inputs.force_fresh_download }}
        uses: actions/download-artifact@v4
        with:
          name: all-models
          path: models
      - name: Log runner hardware
        run: |
          echo "Runner: $RUNNER_OS/$RUNNER_ARCH"
          uname -a || true
          sysctl -n machdep.cpu.brand_string || true
          system_profiler SPHardwareDataType || true
          system_profiler SPDisplaysDataType || true
      - name: Cache binaries and MLX
        uses: actions/cache@v4
        with:
          path: |
            bin
            mlx
            models/Bonsai-${{ env.BONSAI_MODEL }}-mlx
            models/Ternary-Bonsai-${{ env.BONSAI_MODEL }}-mlx-2bit
          key: ${{ runner.os }}-${{ runner.arch }}-bonsai-bin-mlx-v3-${{ hashFiles('scripts/download_binaries.sh', 'setup.sh') }}
      - name: Setup
        env:
          BONSAI_FAMILY: all
        run: ./setup.sh
      - name: llama-cli smoke test (Bonsai Q1_0, CPU)
        run: './scripts/run_llama.sh -ngl 0 -c 256 -st -n 50 -p "The meaning of life is"'
      - name: llama-cli smoke test (Bonsai Q1_0, Metal)
        run: './scripts/run_llama.sh -ngl 99 -c 256 -st -n 50 -p "The meaning of life is"'
      - name: llama-cli smoke test (Ternary-Bonsai Q2_0, CPU)
        env:
          BONSAI_FAMILY: ternary
        run: './scripts/run_llama.sh -ngl 0 -c 256 -st -n 50 -p "The meaning of life is"'
      - name: llama-cli smoke test (Ternary-Bonsai Q2_0, Metal)
        env:
          BONSAI_FAMILY: ternary
        run: './scripts/run_llama.sh -ngl 99 -c 256 -st -n 50 -p "The meaning of life is"'
      - name: MLX smoke test (Bonsai 1-bit)
        run: './scripts/run_mlx.sh -n 50 -p "The meaning of life is"'
      - name: Download MLX model (Ternary-Bonsai 2-bit)
        env:
          BONSAI_FAMILY: ternary
        run: ./scripts/download_models.sh
      - name: MLX smoke test (Ternary-Bonsai 2-bit)
        env:
          BONSAI_FAMILY: ternary
        run: './scripts/run_mlx.sh -n 50 -p "The meaning of life is"'

